<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveTagus | API Inspector</title>
    <link
      rel="shortcut icon"
      href="./imagens/favicon-96x96.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #000;
        color: #e2e8f0;
      }

      pre,
      code,
      .font-mono {
        font-family: "JetBrains Mono", monospace;
      }

      /* Esconder a seta padrão do details */
      summary {
        list-style: none;
        cursor: pointer;
      }
      summary::-webkit-details-marker {
        display: none;
      }

      /* Estilo para o scrollbar idêntico ao da App */
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #000;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #27272a;
        border-radius: 10px;
      }

      /* Efeito de abertura suave */
      details[open] summary {
        background-color: rgba(255, 255, 255, 0.03);
      }

      .mask-gradient {
        -webkit-mask-image: linear-gradient(180deg, #000 95%, transparent);
        mask-image: linear-gradient(180deg, #000 95%, transparent);
      }
    </style>
  </head>
  <body class="min-h-screen flex flex-col">
    <!-- Header Estilo LiveTagus -->
    <header class="w-full max-w-4xl mx-auto pt-10 pb-6 px-6 z-30">
      <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
        <div class="space-y-1">
          <span
            class="inline-block py-0.5 px-2 border border-blue-500/20 bg-blue-500/10 rounded-full text-[10px] uppercase tracking-[0.2em] font-bold text-blue-400"
          >
            Developer Mode
          </span>
          <h1 class="text-4xl font-light tracking-tighter text-white">
            API
            <span class="font-bold">INSPECTOR.</span>
          </h1>
        </div>

        <div class="flex items-center gap-3">
          <button
            onclick="fetchData()"
            class="px-6 py-3 bg-white text-black text-xs font-bold uppercase tracking-widest hover:bg-zinc-200 transition-all active:scale-95 shadow-lg shadow-white/5"
          >
            Atualizar Dados
          </button>
        </div>
      </div>
    </header>

    <main
      class="w-full max-w-4xl mx-auto flex-grow flex flex-col px-6 overflow-hidden"
    >
      <!-- Status Bar -->
      <div class="flex items-center justify-between mb-4 px-1">
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2">
            <span
              id="status-badge"
              class="px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider bg-zinc-800 text-zinc-400"
            >
              IDLE
            </span>
            <span id="timestamp" class="text-[10px] font-mono text-zinc-500">
              --:--:--
            </span>
          </div>
        </div>
        <div
          class="text-[9px] font-bold uppercase tracking-widest text-zinc-600"
        >
          Endereço: api.livetagus.pt
        </div>
      </div>

      <!-- Main Content Container -->
      <div
        class="flex-grow bg-zinc-900/20 border border-white/5 rounded-2xl overflow-hidden relative mb-8"
      >
        <!-- Loader -->
        <div
          id="loader"
          class="absolute inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center hidden z-50"
        >
          <div class="flex flex-col items-center">
            <div
              class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"
            ></div>
            <p
              class="mt-4 text-[10px] font-bold uppercase tracking-[0.2em] text-blue-500"
            >
              A processar...
            </p>
          </div>
        </div>

        <!-- Error Box -->
        <div id="error-box" class="hidden p-8">
          <div
            id="error-message"
            class="bg-red-500/10 border border-red-500/20 p-4 rounded-xl font-mono text-xs text-red-400"
          ></div>
        </div>

        <!-- Lista de Comboios (Injetado via JS) -->
        <div
          id="trains-list"
          class="divide-y divide-white/5 custom-scrollbar overflow-auto h-full mask-gradient"
        >
          <div
            class="h-full flex flex-col items-center justify-center text-zinc-600 gap-4"
          >
            <svg
              class="w-12 h-12 opacity-10"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.5"
                d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"
              ></path>
            </svg>
            <p class="text-[10px] uppercase tracking-widest font-medium">
              Aguardando solicitação de dados
            </p>
          </div>
        </div>
      </div>
      <div class="mb-12">
        <a
          href="./"
          class="inline-flex items-center text-xs font-bold uppercase tracking-widest text-zinc-400 hover:text-zinc-900 dark:hover:text-white transition-colors group"
        >
          <span class="group-hover:-translate-x-1 transition-transform mr-2">
            ←
          </span>
          Voltar
        </a>
      </div>
    </main>

    <!-- Footer -->
    <footer
      class="w-full max-w-4xl mx-auto pb-8 px-6 flex justify-between items-center opacity-40"
    >
      <div class="flex items-center gap-2">
        <div class="w-1 h-1 rounded-full bg-blue-500"></div>
        <span class="text-[9px] font-bold uppercase tracking-widest">
          LiveTagus Engine v2.5
        </span>
      </div>
      <span class="text-[9px] font-mono">LiveTagus Ecosystem</span>
    </footer>

    <script>
      const CLIENT_API_KEY =
        "KoKi30rVWuwkF9lqKL6j4mb0VMg3dIXWs6QDHZ3de0G8lC5qvu";
      const API_URL = "https://api.livetagus.pt/fertagus";

      async function fetchData() {
        const listContainer = document.getElementById("trains-list");
        const loader = document.getElementById("loader");
        const statusBadge = document.getElementById("status-badge");
        const errorBox = document.getElementById("error-box");
        const timestamp = document.getElementById("timestamp");

        loader.classList.remove("hidden");
        errorBox.classList.add("hidden");
        statusBadge.innerText = "FETCHING";
        statusBadge.className =
          "px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider bg-blue-500/20 text-blue-400";

        try {
          const res = await fetch(API_URL + "?t=" + Date.now(), {
            method: "GET",
            headers: {
              "x-api-key": CLIENT_API_KEY,
              Accept: "application/json",
            },
            cache: "no-store",
          });

          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const data = await res.json();
          renderTrains(data);

          statusBadge.innerText = "ONLINE";
          statusBadge.className =
            "px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider bg-emerald-500/20 text-emerald-400";
          timestamp.innerText = new Date().toLocaleTimeString("pt-PT");
        } catch (err) {
          errorBox.classList.remove("hidden");
          document.getElementById("error-message").innerText =
            `CRITICAL_ERROR: ${err.message}`;
          statusBadge.innerText = "ERROR";
          statusBadge.className =
            "px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider bg-red-500/20 text-red-400";
        } finally {
          loader.classList.add("hidden");
        }
      }

      function renderTrains(data) {
        const listContainer = document.getElementById("trains-list");
        listContainer.innerHTML = "";

        const keys = Object.keys(data);

        if (keys.length === 0) {
          listContainer.innerHTML =
            '<div class="p-12 text-center text-zinc-600 text-[10px] uppercase tracking-widest">Nenhum payload recebido.</div>';
          return;
        }

        keys.forEach((key) => {
          const train = data[key];
          const isFuture = key === "futureTrains";

          const details = document.createElement("details");
          details.className = "group transition-all hover:bg-white/[0.02]";

          let summaryTitle = "";
          if (isFuture) {
            summaryTitle = `<span class="text-amber-500 font-bold font-mono text-xs tracking-tighter">FUTURE_TRAINS_ARRAY</span>`;
          } else {
            const route =
              train.Origem && train.Destino
                ? `${train.Origem} → ${train.Destino}`
                : "SYSTEM_LOG";
            summaryTitle = `
                        <div class="flex items-center gap-3 min-w-0">
                            <span class="text-blue-500 font-mono font-bold text-xs">#${key}</span>
                            <span class="text-zinc-300 text-xs font-semibold truncate uppercase tracking-tight">${route}</span>
                        </div>
                        <div class="ml-auto flex items-center gap-2">
                            ${train.Live ? '<span class="text-[8px] font-bold bg-blue-500/10 text-blue-500 px-1.5 py-0.5 rounded border border-blue-500/20 uppercase tracking-widest">LIVE</span>' : ""}
                            <svg class="w-3 h-3 text-zinc-700 group-open:rotate-180 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </div>
                    `;
          }

          details.innerHTML = `
                    <summary class="flex items-center p-5 outline-none">
                        ${summaryTitle}
                    </summary>
                    <div class="bg-black/40 px-5 pb-5 border-t border-white/[0.03]">
                        <div class="flex justify-between items-center py-3">
                            <span class="text-[9px] text-zinc-600 font-bold uppercase tracking-[0.2em]">JSON_STRUCT_DATA</span>
                            <button onclick="copySnippet('${key}')" class="text-[9px] bg-zinc-800 hover:bg-zinc-700 text-zinc-300 px-3 py-1 rounded-md transition-all uppercase font-bold tracking-widest">Copiar</button>
                        </div>
                        <pre id="code-${key}" class="text-blue-400/80 text-[11px] leading-relaxed overflow-auto custom-scrollbar p-4 bg-[#050505] border border-white/5 rounded-xl">${JSON.stringify(train, null, 2)}</pre>
                    </div>
                `;

          listContainer.appendChild(details);
        });
      }

      async function copySnippet(id) {
        const text = document.getElementById(`code-${id}`).innerText;
        const btn = event.target;
        try {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          document.body.removeChild(textarea);

          const originalText = btn.innerText;
          btn.innerText = "COPIADO";
          btn.className = btn.className.replace(
            "bg-zinc-800",
            "bg-blue-600 text-white",
          );
          setTimeout(() => {
            btn.innerText = originalText;
            btn.className = btn.className.replace(
              "bg-blue-600 text-white",
              "bg-zinc-800",
            );
          }, 1500);
        } catch (err) {
          console.error("Copy failed");
        }
      }

      window.onload = fetchData;
    </script>
  </body>
</html>
