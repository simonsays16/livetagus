# Configurações de Build (Standard)
[build]
  publish = "."

# 1. Redirecionar /status.html para o novo domínio
[[redirects]]
  from = "/status.html"
  to = "https://status.livetagus.pt"
  status = 301
  force = true

# 2. Redirecionar /status (sem .html)
[[redirects]]
  from = "/status"
  to = "https://status.livetagus.pt"
  status = 301
  force = true

# 3. Redirecionar /horários para retirar acento
[[redirects]]
  from = "/horários"
  to = "/horarios"
  status = 301
  force = true

# 4. Proteger .env
[[redirects]]
  from = "/.env"
  to = "/404"
  status = 403
  force = true

# 5. Permitir acesso da simple analytics (Bypass CSP)
[[redirects]]
  from = "/api/sa.js"
  to = "https://scripts.simpleanalyticscdn.com/latest.js"
  status = 200
  force = true

# 6. Permitir acesso da simple analytics (Bypass CSP)
[[redirects]]
  from = "/api/sa-events/*"
  to = "https://queue.simpleanalyticscdn.com/*"
  status = 200
  force = true

[[redirects]]
  from = "/maplibre-gl.css"
  to = "https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
  status = 200
  force = true

[[redirects]]
  from = "/maplibre-gl.js"
  to = "https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"
  status = 200
  force = true

# Regra 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# CABEÇALHOS DE SEGURANÇA
[[headers]]
  for = "/*"
  [headers.values]
    # Política Principal de Segurança (CSP) - 'unsafe-inline' retirados nos scripts
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://tile.openstreetmap.org/ https://queue.simpleanalyticscdn.com; connect-src 'self' https://api.livetagus.pt https://api.npoint.io https://www.netlify.com https://i.scdn.co https://fonts.googleapis.com https://fonts.gstatic.com https://api.github.com/ https://queue.simpleanalyticscdn.com https://api.carrismetropolitana.pt https://tile.openstreetmap.org/; worker-src 'self' blob:; manifest-src 'self' blob:;"

    # Proteção contra partilha não autorizada de recursos
    Cross-Origin-Resource-Policy = "same-origin"

    # Proteção contra XSS
    X-Content-Type-Options = "nosniff"
    
    # Proteção contra Clickjacking (impedir que outros sites ponham a livetagus num iframe)
    X-Frame-Options = "DENY"
    
    # Proteção XSS básica para browsers antigos
    X-XSS-Protection = "1; mode=block"
    
    # Referrer Policy (Privacidade)
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # HSTS (Força HTTPS estrito durante 1 ano)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Permissions Policy (Bloqueia uso não autorizado de câmara/mic/localização pelo browser)
    Permissions-Policy = "camera=(), microphone=(), payment=()"

# Permitir o acesso às imagens para casos como email e opengraph
[[headers]]
  for = "/imagens/*"
  [headers.values]
    Cross-Origin-Resource-Policy = "cross-origin"

# Cache eficiente para imagens e fontes
[[headers]]
  for = "*.{png,jpg,jpeg,gif,svg,woff,woff2}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"